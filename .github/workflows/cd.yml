# CD Pipeline — Builds, pushes to ECR, and deploys to EC2
# Triggered on every push/merge to main

name: CD Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  ECR_REPO: 655506454462.dkr.ecr.eu-west-1.amazonaws.com/ticket-bot

jobs:
  deploy:
    name: Build, Push to ECR & Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        run: |
          docker build -t ${{ env.ECR_REPO }}:latest ./project-2/backend
          docker build -t ${{ env.ECR_REPO }}:${{ github.sha }} ./project-2/backend
          docker push ${{ env.ECR_REPO }}:latest
          docker push ${{ env.ECR_REPO }}:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Log in to ECR
            aws ecr get-login-password --region eu-west-1 | sudo docker login --username AWS --password-stdin 655506454462.dkr.ecr.eu-west-1.amazonaws.com
            # Pull latest image
            sudo docker pull 655506454462.dkr.ecr.eu-west-1.amazonaws.com/ticket-bot:latest
            # Restart backend with new image
            cd ~/ticket-bot
            sudo docker-compose down
            sudo docker-compose up -d
